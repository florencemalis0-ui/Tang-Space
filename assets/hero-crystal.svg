<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" role="img" aria-label="TangTang · Phoenix Rose · Code as Art">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#11142e"/>
      <stop offset="100%" stop-color="#0a0e1f"/>
    </radialGradient>
    <linearGradient id="crystalA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#fdebfd" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#eabdf6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="crystalB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdbfe8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#eabdf6" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="signal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb5959" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#fb5959" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fb5959" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="320" fill="url(#bg)"/>

  <!-- 远景星河微尘 -->
  <g fill="#fdebfd" opacity="0.35">
    <circle cx="60" cy="40" r="0.8"/><circle cx="120" cy="280" r="0.6"/><circle cx="200" cy="60" r="0.9"/>
    <circle cx="700" cy="50" r="0.7"/><circle cx="760" cy="270" r="0.8"/><circle cx="640" cy="290" r="0.6"/>
    <circle cx="40" cy="180" r="0.5"/><circle cx="180" cy="200" r="0.7"/><circle cx="720" cy="180" r="0.5"/>
    <circle cx="560" cy="40" r="0.6"/><circle cx="300" cy="300" r="0.7"/><circle cx="500" cy="20" r="0.5"/>
  </g>

  <!-- 大水晶主体（左） -->
  <g filter="url(#bloom)" opacity="0.92">
    <polygon points="280,80 360,60 420,140 380,230 300,240 240,170" fill="url(#crystalA)" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1"/>
    <polygon points="280,80 360,60 380,230 300,240 240,170" fill="#ffffff" opacity="0.12"/>
    <polygon points="360,60 420,140 380,230" fill="#eabdf6" opacity="0.18"/>
  </g>

  <!-- 小水晶（右后） -->
  <g filter="url(#bloom)" opacity="0.7">
    <polygon points="500,120 560,110 600,180 570,250 510,240 470,190" fill="url(#crystalB)" stroke="#cdbfe8" stroke-opacity="0.4" stroke-width="1"/>
    <polygon points="560,110 600,180 570,250 510,240" fill="#ffffff" opacity="0.08"/>
  </g>

  <!-- 玫红信号水晶（唯一高饱和点，One Signal） -->
  <g filter="url(#bloom)">
    <circle cx="640" cy="150" r="36" fill="url(#signal)"/>
    <polygon points="640,120 668,135 668,170 640,185 612,170 612,135" fill="#fb5959" opacity="0.88" stroke="#fda4a4" stroke-width="1"/>
    <polygon points="640,120 668,135 640,185 612,135" fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- 微尘点缀（中近景） -->
  <g fill="#eabdf6" opacity="0.55">
    <circle cx="150" cy="120" r="1.2"/><circle cx="450" cy="70" r="1"/><circle cx="220" cy="260" r="1"/>
    <circle cx="480" cy="280" r="1.3"/><circle cx="680" cy="230" r="1"/><circle cx="100" cy="240" r="0.9"/>
  </g>

  <!-- 标题 -->
  <text x="400" y="290" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="13" letter-spacing="3" fill="#eabdf6" opacity="0.75">PHOENIX ROSE · CODE AS ART</text>
</svg>
